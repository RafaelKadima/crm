<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/omnify-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OmniFy HUB - Plataforma CRM Inteligente com IA" />
    <meta name="theme-color" content="#111110" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>OmniFy HUB</title>

    <style>
      :root { color-scheme: dark; }
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        background: #111110;
        color: #EDEDEC;
        font-family: 'DM Sans', system-ui, sans-serif;
      }

      #root {
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* Loading Screen — Warm, editorial, restrained */
      #omnify-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111110;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      #omnify-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-mark {
        width: 48px;
        height: 48px;
        border: 2px solid rgba(237, 237, 236, 0.08);
        border-top-color: rgba(237, 237, 236, 0.5);
        border-radius: 50%;
        animation: loader-spin 1s linear infinite;
      }

      .loader-text {
        margin-top: 32px;
        font-family: 'DM Sans', sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        display: flex;
        align-items: baseline;
        gap: 0;
      }

      .loader-text span:nth-child(1) { color: #EDEDEC; }
      .loader-text span:nth-child(2) { color: #A09D98; }
      .loader-text span:nth-child(3) {
        color: #7C7A75;
        font-weight: 400;
        font-size: 0.6em;
        margin-left: 6px;
      }

      .loader-bar {
        margin-top: 24px;
        width: 120px;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 1px;
        overflow: hidden;
      }

      .loader-bar-inner {
        height: 100%;
        width: 40%;
        background: rgba(237, 237, 236, 0.3);
        border-radius: 1px;
        animation: loader-slide 1.2s ease-in-out infinite;
      }

      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes loader-slide {
        0% { transform: translateX(-120px); }
        100% { transform: translateX(300px); }
      }
    </style>
  </head>
  <body>
    <div id="omnify-loader">
      <div class="loader-mark"></div>
      <div class="loader-text">
        <span>Omni</span><span>Fy</span><span>HUB</span>
      </div>
      <div class="loader-bar">
        <div class="loader-bar-inner"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('omnify-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 400);
          }
        }, 600);
      });
    </script>
  </body>
</html>
