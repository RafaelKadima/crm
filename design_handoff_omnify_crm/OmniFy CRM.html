<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OmniFy CRM — Protótipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #E8E6E1; font-family: "Inter Tight", -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    #root { height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/tokens.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/contacts.jsx"></script>
  <script type="text/babel" src="src/contact-detail.jsx"></script>
  <script type="text/babel" src="src/pipeline.jsx"></script>
  <script type="text/babel" src="src/leads.jsx"></script>
  <script type="text/babel" src="src/settings.jsx"></script>
  <script type="text/babel" src="src/login.jsx"></script>
  <script type="text/babel" src="src/screens.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function useTheme() {
      const [theme, setTheme] = useState(() => localStorage.getItem("omnify_theme") || "light");
      useEffect(() => { localStorage.setItem("omnify_theme", theme); }, [theme]);
      return [theme, () => setTheme(t => t === "light" ? "dark" : "light")];
    }

    function useRoute() {
      const [route, setRouteState] = useState(() => {
        try { return JSON.parse(localStorage.getItem("omnify_route")) || { page: "login" }; }
        catch { return { page: "login" }; }
      });
      const setRoute = (r) => {
        const nr = typeof r === "string" ? { page: r } : r;
        setRouteState(nr);
        localStorage.setItem("omnify_route", JSON.stringify(nr));
      };
      return [route, setRoute];
    }

    function App() {
      const [theme, toggleTheme] = useTheme();
      const t = useOmnifyTokens(theme);
      const [route, setRoute] = useRoute();

      const nav = (page) => setRoute({ page });
      const openContact = (c) => setRoute({ page: "contact-detail", contact: c });
      const openLead    = (l) => setRoute({ page: "lead-detail", lead: l });
      const openDeal    = () => setRoute({ page: "deal-detail" });

      if (route.page === "login") {
        return <LoginScreen t={t} onLogin={() => setRoute({ page: "dashboard" })}/>;
      }

      const screen = (() => {
        switch (route.page) {
          case "dashboard":       return <DashboardBold t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "inbox":           return <InboxScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "contacts":        return <ContactsBold t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav} onOpenContact={openContact}/>;
          case "contact-detail":  return <ContactDetailBold t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav} contact={route.contact} onClose={() => nav("contacts")}/>;
          case "companies":       return <CompaniesScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "pipeline":        return <PipelineBold t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav} onOpenDeal={openDeal}/>;
          case "deal-detail":     return <DealDetailScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "leads":           return <LeadsScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav} onOpenLead={openLead}/>;
          case "lead-detail":     return <LeadDetail t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav} lead={route.lead} onClose={() => nav("leads")}/>;
          case "activities":      return <ActivitiesScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "reports":         return <ReportsScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "sdr":             return <SdrScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "ads":             return <AdsScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "segments":        return <SegmentsScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          case "settings":        return <SettingsScreen t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
          default:                return <DashboardBold t={t} theme={theme} onToggleTheme={toggleTheme} onNav={nav}/>;
        }
      })();

      return (
        <div style={{ height: "100vh", width: "100vw", background: t.bg, fontFamily: '"Inter Tight", sans-serif', overflow: "hidden" }}>
          {screen}
          {/* Floating logout button (bottom-left) for demo convenience */}
          <button onClick={() => { localStorage.removeItem("omnify_route"); setRoute({ page: "login" }); }}
            style={{
              position: "fixed", bottom: 14, left: 14, zIndex: 100,
              padding: "6px 10px", fontSize: 10.5, fontWeight: 600,
              background: "rgba(0,0,0,0.7)", color: "#fff", border: "none",
              borderRadius: 6, cursor: "pointer", fontFamily: "inherit", letterSpacing: 0.5,
            }}>SAIR (demo)</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
