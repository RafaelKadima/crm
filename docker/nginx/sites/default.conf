# ==================================================
# CRM OMNIFY - NGINX CONFIG (HTTPS + INTERNAL API)
# ==================================================

# Upstream para PHP-FPM
upstream php-fpm {
    server php:9000;
}

# Upstream para AI Service
upstream ai-service {
    server ai-service:8001;
}

# Upstream para Reverb WebSocket
upstream reverb {
    server reverb:8080;
}

# ==================================================
# HTTP Server (porta 80)
# - Aceita chamadas internas do Docker (AI Service)
# - Redireciona externo para HTTPS
# ==================================================
server {
    listen 80;
    server_name _;
    
    root /var/www/crm/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    access_log /var/log/nginx/crm_access.log;
    error_log /var/log/nginx/crm_error.log;

    # WebSocket - Laravel Reverb
    location /app {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /apps {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API Routes - Laravel Backend
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /oauth {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # AI Service Proxy
    location /ai/ {
        proxy_pass http://ai-service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # PHP Processing
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Frontend Assets (React build)
    location /assets {
        alias /var/www/frontend/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Storage files
    location /storage {
        alias /var/www/crm/storage/app/public;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA Fallback - React Router
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Security
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}

# ==================================================
# HTTPS Server (porta 443) - Se SSL configurado
# ==================================================
server {
    listen 443 ssl;
    server_name crm.omnify.center;
    
    root /var/www/crm/public;
    index index.php index.html;

    # SSL - Verifica se existe antes de usar
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers (always = inclui erros 4xx/5xx)
    # HSTS — força HTTPS por 1 ano com preload (https://hstspreload.org)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Bloqueia content-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Proibe iframe de outros origins (proteção clickjacking)
    add_header X-Frame-Options "DENY" always;
    # Limita o que vai no Referer pra third-party
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restringe APIs sensíveis (geolocation/mic/cam não usadas)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP estrito — Vite/React usam inline scripts; libera o necessário pra Reverb (wss),
    # ai-service (mesma origem via /ai/), Sentry (cdn + ingest), Meta Embedded Signup
    # (connect.facebook.net), e fontes Google. Manter sob auditoria — relaxar só se algo quebrar.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://connect.facebook.net https://*.sentry.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss://crm.omnify.center https://graph.facebook.com https://*.sentry.io https://o*.ingest.sentry.io; media-src 'self' blob: https:; frame-src 'self' https://www.facebook.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    charset utf-8;
    client_max_body_size 50M;

    access_log /var/log/nginx/crm_access.log;
    error_log /var/log/nginx/crm_error.log;

    # WebSocket - Laravel Reverb
    location /app {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /apps {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API Routes
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /oauth {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # AI Service
    location /ai/ {
        proxy_pass http://ai-service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # PHP
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Frontend Assets
    location /assets {
        alias /var/www/frontend/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Storage
    location /storage {
        alias /var/www/crm/storage/app/public;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA Fallback
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Security
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}
